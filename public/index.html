<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クリニック共有付箋ボード</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📌</text></svg>">
<style>
  :root {
    --header-bg: #1a7f76;
    --header-text: #ffffff;
    --board-bg: #f2ede4;
    --c-urgent: #e53935;
    --c-urgent-bg: #ffdad6;
    --c-caution: #ef8f00;
    --c-caution-bg: #ffe9c7;
    --c-info: #1e6fd9;
    --c-info-bg: #d9e8ff;
    --c-normal: #b8a534;
    --c-normal-bg: #fff6b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", Meiryo, sans-serif;
    background: var(--board-bg);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  /* ===== ヘッダー ===== */
  header {
    background: var(--header-bg);
    color: var(--header-text);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 6px rgba(0,0,0,.2);
  }
  header h1 { font-size: 18px; font-weight: 700; white-space: nowrap; }
  header h1 .pin { margin-right: 4px; }
  .head-badge {
    color: #fff;
    border-radius: 999px;
    padding: 3px 12px;
    font-size: 13px;
    font-weight: 700;
    display: none;
  }
  #urgentBadge { background: var(--c-urgent); animation: pulse 1.2s infinite; }
  #dueBadge { background: var(--c-caution); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }
  .spacer { flex: 1; }
  .name-box { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .name-box input {
    border: none; border-radius: 6px; padding: 7px 10px; font-size: 13px; width: 100px;
  }
  .add-btn {
    background: #fff;
    color: var(--header-bg);
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 1px 3px rgba(0,0,0,.25);
  }
  .add-btn:hover { background: #e8f6f4; }

  /* ===== ツールバー ===== */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 12px 16px 0;
    max-width: 1400px;
    margin: 0 auto;
  }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .tab {
    background: #fff;
    border: 1px solid #d5cebf;
    border-radius: 999px;
    padding: 8px 15px;
    font-size: 13px;
    cursor: pointer;
    color: #555;
  }
  .tab.active {
    background: var(--header-bg);
    border-color: var(--header-bg);
    color: #fff;
    font-weight: 700;
  }
  .search-box input {
    border: 1px solid #d5cebf;
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 13px;
    width: 170px;
    background: #fff;
  }
  .toggle-hidden {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: #555; cursor: pointer; user-select: none;
  }
  .toggle-hidden input { width: 16px; height: 16px; }

  /* ===== ボード ===== */
  .board {
    max-width: 1400px;
    margin: 0 auto;
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    align-items: start;
  }
  .empty-msg {
    grid-column: 1 / -1;
    text-align: center;
    color: #999;
    padding: 60px 0;
    font-size: 15px;
  }

  /* ===== 付箋カード ===== */
  .note {
    border-radius: 4px;
    padding: 12px 14px 10px;
    box-shadow: 2px 3px 8px rgba(0,0,0,.15);
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    word-break: break-word;
  }
  .note::before {
    /* テープ風の飾り */
    content: '';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%) rotate(-2deg);
    width: 70px;
    height: 16px;
    background: rgba(255,255,255,.55);
    box-shadow: 0 1px 2px rgba(0,0,0,.08);
  }
  .note.is-pinned::before {
    content: '📌';
    background: none;
    box-shadow: none;
    font-size: 20px;
    top: -12px;
    width: auto;
    height: auto;
  }
  .note.cat-normal  { background: var(--c-normal-bg); }
  .note.cat-info    { background: var(--c-info-bg); }
  .note.cat-caution { background: var(--c-caution-bg); }
  .note.cat-urgent  { background: var(--c-urgent-bg); border: 2px solid var(--c-urgent); animation: urgentGlow 1.6s infinite; }
  @keyframes urgentGlow {
    0%,100% { box-shadow: 2px 3px 8px rgba(0,0,0,.15); }
    50% { box-shadow: 0 0 14px rgba(229,57,53,.65); }
  }
  .note.is-hidden { opacity: .5; border: 2px dashed #999; }
  .note.is-done { opacity: .65; }
  .note.is-done .note-text { text-decoration: line-through; color: #888; }

  .note-head { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 11px; font-weight: 700; border-radius: 4px; padding: 2px 8px; color: #fff;
  }
  .badge.cat-normal  { background: var(--c-normal); }
  .badge.cat-info    { background: var(--c-info); }
  .badge.cat-caution { background: var(--c-caution); }
  .badge.cat-urgent  { background: var(--c-urgent); }
  .badge.assignee { background: #fff; color: #555; border: 1px solid #bbb; font-weight: 600; }
  .badge.hidden-mark { background: #777; }
  .badge.popup-mark { background: #6a4fb3; }
  .badge.due-ok { background: #607d8b; }
  .badge.due-today { background: var(--c-caution); }
  .badge.due-over { background: var(--c-urgent); animation: pulse 1.2s infinite; }

  .note-text {
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    flex: 1;
  }
  .note-acks {
    font-size: 11px;
    color: #2e7d32;
    line-height: 1.5;
  }
  .note-acks.none { color: #999; }
  .note-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    border-top: 1px dashed rgba(0,0,0,.15);
    padding-top: 6px;
  }
  .note-meta { font-size: 11px; color: #777; }
  .note-actions { display: flex; gap: 2px; }
  .icon-btn {
    background: none; border: none; cursor: pointer;
    font-size: 16px; padding: 5px 7px; border-radius: 6px; line-height: 1;
  }
  .icon-btn:hover { background: rgba(0,0,0,.08); }
  .icon-btn.active-pin { background: rgba(0,0,0,.12); border-radius: 6px; }

  /* ===== 完了セクション ===== */
  .done-section {
    max-width: 1400px;
    margin: 8px auto 40px;
    padding: 0 16px;
  }
  .done-toggle {
    background: none; border: none; cursor: pointer;
    font-size: 14px; color: #666; padding: 10px 0; font-weight: 600;
  }
  .done-hint { font-size: 11px; color: #999; margin-left: 8px; font-weight: 400; }

  /* ===== モーダル ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 12px;
    width: 100%;
    max-width: 460px;
    max-height: 92vh;
    overflow-y: auto;
    padding: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,.3);
  }
  .modal h2 { font-size: 16px; margin-bottom: 14px; color: #333; }
  .field { margin-bottom: 14px; }
  .field label.field-label { display: block; font-size: 12px; font-weight: 700; color: #666; margin-bottom: 6px; }
  .field textarea {
    width: 100%; min-height: 110px; resize: vertical;
    border: 1px solid #ccc; border-radius: 8px; padding: 10px; font-size: 16px;
    font-family: inherit; line-height: 1.6;
  }
  .field select {
    border: 1px solid #ccc; border-radius: 8px; padding: 10px; font-size: 15px; width: 100%;
    background: #fff;
  }
  .cat-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .cat-option { position: relative; }
  .cat-option input { position: absolute; opacity: 0; }
  .cat-option span {
    display: inline-block; padding: 9px 15px; border-radius: 8px;
    font-size: 13px; font-weight: 700; cursor: pointer; border: 2px solid transparent; color: #333;
  }
  .cat-option.cat-normal span  { background: var(--c-normal-bg); }
  .cat-option.cat-info span    { background: var(--c-info-bg); }
  .cat-option.cat-caution span { background: var(--c-caution-bg); }
  .cat-option.cat-urgent span  { background: var(--c-urgent-bg); }
  .cat-option input:checked + span { border-color: #333; }
  .due-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .due-row input[type="datetime-local"] {
    border: 1px solid #ccc; border-radius: 8px; padding: 8px; font-size: 14px; font-family: inherit;
  }
  .mini-btn {
    background: #eef4f3; color: var(--header-bg); border: 1px solid #cfe0dd;
    border-radius: 999px; padding: 7px 12px; font-size: 12px; font-weight: 700; cursor: pointer;
  }
  .mini-btn:hover { background: #ddeae8; }
  .vis-row { display: flex; align-items: flex-start; gap: 8px; font-size: 14px; cursor: pointer; user-select: none; }
  .vis-row input { width: 18px; height: 18px; margin-top: 2px; flex-shrink: 0; }
  .field-note { font-size: 12px; color: #888; margin-top: 4px; padding-left: 26px; }
  .popup-target-row { margin-top: 8px; padding-left: 26px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
  .btn {
    border: none; border-radius: 8px; padding: 11px 22px; font-size: 14px; cursor: pointer; font-weight: 700;
  }
  .btn.primary { background: var(--header-bg); color: #fff; }
  .btn.primary:hover { background: #14655e; }
  .btn.ghost { background: #eee; color: #555; }
  .btn.ghost:hover { background: #ddd; }

  /* ===== ポップアップ通知 ===== */
  .popup-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 16px;
  }
  .popup-overlay.open { display: flex; }
  .popup-card {
    background: #fff;
    border-radius: 14px;
    width: 100%;
    max-width: 540px;
    overflow: hidden;
    box-shadow: 0 14px 50px rgba(0,0,0,.4);
    animation: popIn .25s ease-out;
  }
  @keyframes popIn {
    0% { transform: scale(.85); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .popup-head {
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .popup-head.cat-normal  { background: var(--c-normal); }
  .popup-head.cat-info    { background: var(--c-info); }
  .popup-head.cat-caution { background: var(--c-caution); }
  .popup-head.cat-urgent  { background: var(--c-urgent); animation: pulse 1.2s infinite; }
  .popup-body { padding: 20px; }
  .popup-text {
    font-size: 19px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 14px;
  }
  .popup-meta { font-size: 13px; color: #888; margin-bottom: 18px; }
  .popup-actions { display: flex; justify-content: center; gap: 10px; }
  .popup-actions .btn { font-size: 16px; padding: 14px 40px; }
  .popup-count {
    text-align: center; font-size: 12px; color: #999; margin-top: 10px;
  }

  /* ===== タブレット・スマホ向け調整 ===== */
  @media (pointer: coarse) {
    .icon-btn { font-size: 19px; padding: 8px 10px; }
    .tab { padding: 10px 18px; font-size: 14px; }
    .add-btn { padding: 12px 20px; font-size: 15px; }
    .toggle-hidden input { width: 20px; height: 20px; }
  }
  @media (max-width: 900px) {
    .board { grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; padding: 12px; }
  }
  @media (max-width: 520px) {
    .board { grid-template-columns: 1fr; }
    header h1 { font-size: 15px; }
    .name-box input { width: 80px; }
  }
</style>
</head>
<body>

<header>
  <h1><span class="pin">📌</span>クリニック共有付箋ボード</h1>
  <span class="head-badge" id="urgentBadge"></span>
  <span class="head-badge" id="dueBadge"></span>
  <span class="spacer"></span>
  <div class="name-box">
    <span>端末名:</span>
    <input type="text" id="deviceName" placeholder="例: 受付1" maxlength="20" title="この端末（PC・タブレット）の名前。ポップアップの宛先指定や確認履歴に使われます">
  </div>
  <div class="name-box">
    <span>名前:</span>
    <input type="text" id="myName" placeholder="例: 佐藤" maxlength="20">
  </div>
  <button class="add-btn" id="addBtn">＋ 付箋を追加</button>
</header>

<div class="toolbar">
  <div class="tabs" id="assigneeTabs"></div>
  <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 検索"></div>
  <label class="toggle-hidden">
    <input type="checkbox" id="showHidden"> 非表示の付箋も見る
  </label>
</div>

<main class="board" id="board"></main>

<div class="done-section">
  <button class="done-toggle" id="doneToggle">▸ 完了した付箋 (0)</button><span class="done-hint">※完了から7日で自動的に削除されます</span>
  <div class="board" id="doneBoard" style="display:none; padding: 8px 0 0;"></div>
</div>

<!-- 追加・編集モーダル -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">付箋を追加</h2>
    <div class="field">
      <label class="field-label">内容</label>
      <textarea id="noteText" placeholder="例: 本日 午後の予約 田中様 → キャンセルになりました" maxlength="2000"></textarea>
    </div>
    <div class="field">
      <label class="field-label">種類</label>
      <div class="cat-options" id="catOptions">
        <label class="cat-option cat-normal"><input type="radio" name="cat" value="normal" checked><span>通常</span></label>
        <label class="cat-option cat-info"><input type="radio" name="cat" value="info"><span>連絡</span></label>
        <label class="cat-option cat-caution"><input type="radio" name="cat" value="caution"><span>⚠ 要注意</span></label>
        <label class="cat-option cat-urgent"><input type="radio" name="cat" value="urgent"><span>🚨 緊急</span></label>
      </div>
    </div>
    <div class="field">
      <label class="field-label">宛先</label>
      <select id="noteAssignee">
        <option value="all">全員</option>
        <option value="reception">受付</option>
        <option value="nurse">看護師</option>
        <option value="doctor">医師</option>
        <option value="office">事務</option>
      </select>
    </div>
    <div class="field">
      <label class="field-label">期限（任意）</label>
      <div class="due-row">
        <input type="datetime-local" id="noteDue">
        <button type="button" class="mini-btn" id="dueToday">今日中</button>
        <button type="button" class="mini-btn" id="dueTomorrow">明日朝</button>
        <button type="button" class="mini-btn" id="dueClear">クリア</button>
      </div>
      <div class="field-note" style="padding-left:0;">期限を過ぎると付箋に「期限切れ」と赤く表示されます。</div>
    </div>
    <div class="field">
      <label class="vis-row">
        <input type="checkbox" id="notePopup">
        <span>🔔 ポップアップで通知する</span>
      </label>
      <div class="field-note">対象の端末に、確認ボタンを押すまで消えない通知が表示されます。誰が確認したかは付箋に記録されます。</div>
      <div class="popup-target-row" id="popupTargetRow" style="display:none;">
        <select id="popupTarget">
          <option value="all">すべての端末</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label class="vis-row">
        <input type="checkbox" id="noteVisible" checked>
        <span>👁 ボードに表示する（OFFにすると「非表示の付箋も見る」をONにした人だけに見えます）</span>
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="cancelBtn">キャンセル</button>
      <button class="btn primary" id="saveBtn">保存</button>
    </div>
  </div>
</div>

<!-- ポップアップ通知 -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup-card">
    <div class="popup-head" id="popupHead">🔔 お知らせ</div>
    <div class="popup-body">
      <div class="popup-text" id="popupText"></div>
      <div class="popup-meta" id="popupMeta"></div>
      <div class="popup-actions">
        <button class="btn primary" id="popupAckBtn">確認しました</button>
      </div>
      <div class="popup-count" id="popupCount"></div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var ASSIGNEE_LABELS = { all: '全員', reception: '受付', nurse: '看護師', doctor: '医師', office: '事務' };
  var CATEGORY_LABELS = { normal: '通常', info: '連絡', caution: '⚠ 要注意', urgent: '🚨 緊急' };
  var CATEGORY_ORDER = { urgent: 0, caution: 1, info: 2, normal: 3 };

  var state = {
    notes: [],
    devices: [],
    filter: 'all',
    search: '',
    showHidden: false,
    showDone: false,
    editingId: null,
    lastJson: '',
    currentPopup: null,
  };

  var $ = function (id) { return document.getElementById(id); };
  var board = $('board');
  var doneBoard = $('doneBoard');

  // ---- 名前・端末名の保存 ----
  $('myName').value = localStorage.getItem('fusen_name') || '';
  $('myName').addEventListener('change', function () {
    localStorage.setItem('fusen_name', this.value.trim());
  });
  $('deviceName').value = localStorage.getItem('fusen_device') || '';
  $('deviceName').addEventListener('change', function () {
    localStorage.setItem('fusen_device', this.value.trim());
    fetchNotes();
  });

  // ---- 確認済みポップアップの記録（この端末内のみ）----
  var acked = {};
  try { acked = JSON.parse(localStorage.getItem('fusen_acked') || '{}') || {}; } catch (e) { acked = {}; }
  function saveAcked() { localStorage.setItem('fusen_acked', JSON.stringify(acked)); }

  // ---- 宛先タブ ----
  var tabDefs = [
    { key: 'all', label: 'すべて' },
    { key: 'reception', label: '受付' },
    { key: 'nurse', label: '看護師' },
    { key: 'doctor', label: '医師' },
    { key: 'office', label: '事務' },
  ];
  var tabsEl = $('assigneeTabs');
  tabDefs.forEach(function (t) {
    var b = document.createElement('button');
    b.className = 'tab' + (t.key === state.filter ? ' active' : '');
    b.textContent = t.label;
    b.addEventListener('click', function () {
      state.filter = t.key;
      Array.prototype.forEach.call(tabsEl.children, function (c) { c.classList.remove('active'); });
      b.classList.add('active');
      render();
    });
    tabsEl.appendChild(b);
  });

  $('searchInput').addEventListener('input', function () {
    state.search = this.value.trim();
    render();
  });
  $('showHidden').addEventListener('change', function () {
    state.showHidden = this.checked;
    render();
  });
  $('doneToggle').addEventListener('click', function () {
    state.showDone = !state.showDone;
    doneBoard.style.display = state.showDone ? 'grid' : 'none';
    renderDoneToggleLabel();
  });

  // ---- 時刻表示 ----
  function timeAgo(iso) {
    var diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 60) return 'たった今';
    if (diff < 3600) return Math.floor(diff / 60) + '分前';
    if (diff < 86400) return Math.floor(diff / 3600) + '時間前';
    var d = new Date(iso);
    return (d.getMonth() + 1) + '/' + d.getDate() + ' ' +
      d.getHours() + ':' + ('0' + d.getMinutes()).slice(-2);
  }

  function formatDue(iso) {
    var d = new Date(iso);
    return (d.getMonth() + 1) + '/' + d.getDate() + ' ' +
      d.getHours() + ':' + ('0' + d.getMinutes()).slice(-2);
  }

  // 期限の状態: 'over'(期限切れ) / 'today'(今日中) / 'ok'
  function dueStatus(iso) {
    var due = new Date(iso);
    var now = new Date();
    if (due.getTime() < now.getTime()) return 'over';
    var endOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
    if (due.getTime() <= endOfToday.getTime()) return 'today';
    return 'ok';
  }

  // ---- フィルタ ----
  function matchesFilter(n) {
    if (state.filter !== 'all' && n.assignee !== 'all' && n.assignee !== state.filter) return false;
    if (!state.showHidden && n.visible === false) return false;
    if (state.search && n.text.toLowerCase().indexOf(state.search.toLowerCase()) === -1) return false;
    return true;
  }

  // 並び順: ピン留め → 種類(緊急が先) → 期限が近い順 → 更新が新しい順
  function sortNotes(a, b) {
    var pa = a.pinned ? 0 : 1;
    var pb = b.pinned ? 0 : 1;
    if (pa !== pb) return pa - pb;
    var ca = CATEGORY_ORDER[a.category] !== undefined ? CATEGORY_ORDER[a.category] : 9;
    var cb = CATEGORY_ORDER[b.category] !== undefined ? CATEGORY_ORDER[b.category] : 9;
    if (ca !== cb) return ca - cb;
    var da = a.dueAt ? new Date(a.dueAt).getTime() : Infinity;
    var db = b.dueAt ? new Date(b.dueAt).getTime() : Infinity;
    if (da !== db) return da - db;
    return new Date(b.updatedAt) - new Date(a.updatedAt);
  }

  // ---- カード生成 ----
  function buildCard(n) {
    var card = document.createElement('div');
    card.className = 'note cat-' + n.category +
      (n.visible === false ? ' is-hidden' : '') +
      (n.done ? ' is-done' : '') +
      (n.pinned ? ' is-pinned' : '');

    var head = document.createElement('div');
    head.className = 'note-head';

    var catBadge = document.createElement('span');
    catBadge.className = 'badge cat-' + n.category;
    catBadge.textContent = CATEGORY_LABELS[n.category] || n.category;
    head.appendChild(catBadge);

    var asBadge = document.createElement('span');
    asBadge.className = 'badge assignee';
    asBadge.textContent = '宛先: ' + (ASSIGNEE_LABELS[n.assignee] || n.assignee);
    head.appendChild(asBadge);

    if (n.dueAt) {
      var st = dueStatus(n.dueAt);
      var dueBadge = document.createElement('span');
      dueBadge.className = 'badge due-' + st;
      dueBadge.textContent =
        (st === 'over' ? '⏰ 期限切れ ' : st === 'today' ? '⏰ 本日 ' : '📅 期限 ') + formatDue(n.dueAt);
      head.appendChild(dueBadge);
    }

    if (n.popup) {
      var popBadge = document.createElement('span');
      popBadge.className = 'badge popup-mark';
      popBadge.textContent = '🔔 ' + (n.popupTarget === 'all' ? '全端末' : n.popupTarget);
      head.appendChild(popBadge);
    }

    if (n.visible === false) {
      var hidBadge = document.createElement('span');
      hidBadge.className = 'badge hidden-mark';
      hidBadge.textContent = '非表示';
      head.appendChild(hidBadge);
    }
    card.appendChild(head);

    var text = document.createElement('div');
    text.className = 'note-text';
    text.textContent = n.text;
    card.appendChild(text);

    // ポップアップ通知の確認履歴（今回の通知分のみ表示）
    if (n.popup && n.popupAt) {
      var acks = (n.acks || []).filter(function (a) { return a.popupAt === n.popupAt; });
      var ackLine = document.createElement('div');
      if (acks.length > 0) {
        ackLine.className = 'note-acks';
        ackLine.textContent = '✔ 確認済み: ' + acks.map(function (a) {
          return a.device + (a.name ? '(' + a.name + ')' : '');
        }).join('・');
        ackLine.title = acks.map(function (a) {
          return a.device + (a.name ? '(' + a.name + ')' : '') + ' — ' + timeAgo(a.at);
        }).join('\n');
      } else {
        ackLine.className = 'note-acks none';
        ackLine.textContent = '✔ 確認: まだありません';
      }
      card.appendChild(ackLine);
    }

    var foot = document.createElement('div');
    foot.className = 'note-foot';

    var meta = document.createElement('span');
    meta.className = 'note-meta';
    meta.textContent = (n.author ? n.author + ' ・ ' : '') + timeAgo(n.updatedAt);
    foot.appendChild(meta);

    var actions = document.createElement('div');
    actions.className = 'note-actions';

    function iconBtn(label, title, handler, extraClass) {
      var b = document.createElement('button');
      b.className = 'icon-btn' + (extraClass ? ' ' + extraClass : '');
      b.textContent = label;
      b.title = title;
      b.addEventListener('click', handler);
      actions.appendChild(b);
    }

    if (!n.done) {
      iconBtn('✅', '完了にする', function () { updateNote(n.id, { done: true }); });
      iconBtn('📌', n.pinned ? 'ピン留めを外す' : 'ピン留め（一番上に固定）', function () {
        updateNote(n.id, { pinned: !n.pinned });
      }, n.pinned ? 'active-pin' : '');
      iconBtn(n.visible === false ? '🙈' : '👁', n.visible === false ? '表示に戻す' : '非表示にする', function () {
        updateNote(n.id, { visible: n.visible === false });
      });
      iconBtn('✏️', '編集', function () { openModal(n); });
    } else {
      iconBtn('↩️', 'ボードに戻す', function () { updateNote(n.id, { done: false }); });
    }
    iconBtn('🗑️', '削除', function () {
      if (confirm('この付箋を削除しますか？\n\n「' + n.text.slice(0, 40) + (n.text.length > 40 ? '…' : '') + '」')) {
        deleteNote(n.id);
      }
    });

    foot.appendChild(actions);
    card.appendChild(foot);
    return card;
  }

  // ---- 描画 ----
  function renderDoneToggleLabel() {
    var count = state.notes.filter(function (n) { return n.done; }).length;
    $('doneToggle').textContent = (state.showDone ? '▾' : '▸') + ' 完了した付箋 (' + count + ')';
  }

  function render() {
    var active = state.notes.filter(function (n) { return !n.done && matchesFilter(n); }).sort(sortNotes);
    var done = state.notes.filter(function (n) { return n.done && matchesFilter(n); }).sort(sortNotes);

    board.innerHTML = '';
    if (active.length === 0) {
      var msg = document.createElement('div');
      msg.className = 'empty-msg';
      msg.textContent = '付箋はありません。「＋ 付箋を追加」から作成できます。';
      board.appendChild(msg);
    } else {
      active.forEach(function (n) { board.appendChild(buildCard(n)); });
    }

    doneBoard.innerHTML = '';
    done.forEach(function (n) { doneBoard.appendChild(buildCard(n)); });
    renderDoneToggleLabel();

    var urgentCount = state.notes.filter(function (n) {
      return !n.done && n.category === 'urgent' && n.visible !== false;
    }).length;
    var badge = $('urgentBadge');
    if (urgentCount > 0) {
      badge.style.display = 'inline-block';
      badge.textContent = '🚨 緊急 ' + urgentCount + '件';
    } else {
      badge.style.display = 'none';
    }

    var overdueCount = state.notes.filter(function (n) {
      return !n.done && n.visible !== false && n.dueAt && dueStatus(n.dueAt) === 'over';
    }).length;
    var dBadge = $('dueBadge');
    if (overdueCount > 0) {
      dBadge.style.display = 'inline-block';
      dBadge.textContent = '⏰ 期限切れ ' + overdueCount + '件';
    } else {
      dBadge.style.display = 'none';
    }

    document.title = (urgentCount > 0 ? '🚨(' + urgentCount + ') ' : '') + 'クリニック共有付箋ボード';
  }

  // ---- 通知音 ----
  function playChime() {
    try {
      var Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      var ctx = new Ctx();
      var t = ctx.currentTime;
      [880, 660, 880].forEach(function (freq, i) {
        var o = ctx.createOscillator();
        var g = ctx.createGain();
        o.type = 'sine';
        o.frequency.value = freq;
        o.connect(g);
        g.connect(ctx.destination);
        var start = t + i * 0.22;
        g.gain.setValueAtTime(0.0001, start);
        g.gain.exponentialRampToValueAtTime(0.25, start + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, start + 0.2);
        o.start(start);
        o.stop(start + 0.22);
      });
    } catch (e) { /* 音が出せない環境では無視 */ }
  }

  // ---- ポップアップ通知 ----
  var popupOverlay = $('popupOverlay');

  function pendingPopups() {
    var dev = $('deviceName').value.trim();
    return state.notes.filter(function (n) {
      return n.popup && n.popupAt && !n.done &&
        (n.popupTarget === 'all' || n.popupTarget === dev) &&
        acked[n.id] !== n.popupAt;
    }).sort(sortNotes);
  }

  function checkPopups() {
    var ids = {};
    state.notes.forEach(function (n) { ids[n.id] = true; });
    var dirty = false;
    Object.keys(acked).forEach(function (k) {
      if (!ids[k]) { delete acked[k]; dirty = true; }
    });
    if (dirty) saveAcked();

    var pending = pendingPopups();
    if (pending.length === 0) {
      state.currentPopup = null;
      popupOverlay.classList.remove('open');
      return;
    }
    var top = pending[0];
    var isNew = !state.currentPopup ||
      state.currentPopup.id !== top.id || state.currentPopup.popupAt !== top.popupAt;
    if (isNew) {
      state.currentPopup = top;
      var head = $('popupHead');
      head.className = 'popup-head cat-' + top.category;
      head.textContent = '🔔 ' + (CATEGORY_LABELS[top.category] || '') + ' のお知らせ';
      $('popupText').textContent = top.text;
      $('popupMeta').textContent =
        (top.author ? top.author + ' ・ ' : '') + timeAgo(top.popupAt) +
        ' ・ 宛先: ' + (ASSIGNEE_LABELS[top.assignee] || top.assignee) +
        (top.dueAt ? ' ・ 期限: ' + formatDue(top.dueAt) : '');
      $('popupCount').textContent = pending.length > 1 ? '未確認の通知が あと' + (pending.length - 1) + '件あります' : '';
      popupOverlay.classList.add('open');
      playChime();
    }
  }

  $('popupAckBtn').addEventListener('click', function () {
    var cur = state.currentPopup;
    if (cur) {
      acked[cur.id] = cur.popupAt;
      saveAcked();
      state.currentPopup = null;
      // サーバーに確認履歴を記録（誰が・どの端末で確認したか）
      fetch('/api/notes/' + cur.id + '/ack', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          device: $('deviceName').value.trim(),
          name: $('myName').value.trim(),
        }),
      }).then(fetchNotes).catch(function () {});
    }
    checkPopups();
  });

  // ---- API ----
  function fetchNotes() {
    var dev = $('deviceName').value.trim();
    return fetch('/api/notes' + (dev ? '?device=' + encodeURIComponent(dev) : ''))
      .then(function (r) { return r.json(); })
      .then(function (data) {
        state.devices = data.devices || [];
        var json = JSON.stringify(data.notes);
        if (json !== state.lastJson) {
          state.lastJson = json;
          state.notes = data.notes;
          render();
        }
        checkPopups();
      })
      .catch(function () { /* 一時的な通信エラーは無視して次のポーリングを待つ */ });
  }

  function updateNote(id, changes) {
    var n = state.notes.find(function (x) { return x.id === id; });
    if (!n) return;
    var payload = Object.assign({}, n, changes);
    fetch('/api/notes/' + id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    }).then(fetchNotes);
  }

  function deleteNote(id) {
    fetch('/api/notes/' + id, { method: 'DELETE' }).then(fetchNotes);
  }

  // ---- 期限入力 ----
  function toLocalInputValue(d) {
    return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2) +
      'T' + ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
  }
  $('dueToday').addEventListener('click', function () {
    var d = new Date();
    d.setHours(18, 0, 0, 0);
    $('noteDue').value = toLocalInputValue(d);
  });
  $('dueTomorrow').addEventListener('click', function () {
    var d = new Date();
    d.setDate(d.getDate() + 1);
    d.setHours(9, 0, 0, 0);
    $('noteDue').value = toLocalInputValue(d);
  });
  $('dueClear').addEventListener('click', function () {
    $('noteDue').value = '';
  });

  // ---- モーダル ----
  var overlay = $('modalOverlay');

  function fillPopupTargets(selected) {
    var sel = $('popupTarget');
    sel.innerHTML = '';
    var optAll = document.createElement('option');
    optAll.value = 'all';
    optAll.textContent = 'すべての端末';
    sel.appendChild(optAll);
    var names = state.devices.map(function (d) { return d.name; });
    if (selected && selected !== 'all' && names.indexOf(selected) === -1) names.push(selected);
    names.forEach(function (name) {
      var d = state.devices.find(function (x) { return x.name === name; });
      var opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name + (d && d.online ? '（接続中）' : '');
      sel.appendChild(opt);
    });
    sel.value = selected || 'all';
    if (sel.value !== (selected || 'all')) sel.value = 'all';
  }

  function openModal(note) {
    state.editingId = note ? note.id : null;
    $('modalTitle').textContent = note ? '付箋を編集' : '付箋を追加';
    $('noteText').value = note ? note.text : '';
    $('noteAssignee').value = note ? note.assignee : 'all';
    $('noteVisible').checked = note ? note.visible !== false : true;
    $('notePopup').checked = note ? !!note.popup : false;
    $('popupTargetRow').style.display = $('notePopup').checked ? 'block' : 'none';
    $('noteDue').value = note && note.dueAt ? toLocalInputValue(new Date(note.dueAt)) : '';
    fillPopupTargets(note ? note.popupTarget : 'all');
    var cat = note ? note.category : 'normal';
    var radios = document.querySelectorAll('input[name="cat"]');
    Array.prototype.forEach.call(radios, function (r) { r.checked = (r.value === cat); });
    overlay.classList.add('open');
    $('noteText').focus();
  }

  function closeModal() {
    overlay.classList.remove('open');
    state.editingId = null;
  }

  $('notePopup').addEventListener('change', function () {
    $('popupTargetRow').style.display = this.checked ? 'block' : 'none';
  });

  $('addBtn').addEventListener('click', function () { openModal(null); });
  $('cancelBtn').addEventListener('click', closeModal);
  overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && overlay.classList.contains('open')) closeModal();
  });

  $('saveBtn').addEventListener('click', function () {
    var text = $('noteText').value.trim();
    if (!text) { alert('内容を入力してください。'); return; }
    var catEl = document.querySelector('input[name="cat"]:checked');
    var dueVal = $('noteDue').value;
    var payload = {
      text: text,
      category: catEl ? catEl.value : 'normal',
      assignee: $('noteAssignee').value,
      visible: $('noteVisible').checked,
      popup: $('notePopup').checked,
      popupTarget: $('popupTarget').value || 'all',
      dueAt: dueVal ? new Date(dueVal).toISOString() : null,
      author: $('myName').value.trim(),
    };

    var selfAck = payload.popup;

    var req;
    if (state.editingId) {
      var original = state.notes.find(function (x) { return x.id === state.editingId; });
      req = fetch('/api/notes/' + state.editingId, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(Object.assign({}, original, payload)),
      });
    } else {
      req = fetch('/api/notes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
    }
    req.then(function (r) {
      if (!r.ok) return r.json().then(function (d) { throw new Error(d.error || '保存に失敗しました'); });
      return r.json();
    }).then(function (d) {
      if (d && d.note && selfAck && d.note.popupAt) {
        acked[d.note.id] = d.note.popupAt;
        saveAcked();
      }
      closeModal();
      return fetchNotes();
    }).catch(function (e) { alert(e.message); });
  });

  // ---- 自動同期(5秒ごと / モーダル編集中は停止) ----
  setInterval(function () {
    if (!overlay.classList.contains('open')) fetchNotes();
  }, 5000);

  // 期限切れ表示は時間経過でも変わるため、1分ごとに再描画
  setInterval(function () {
    if (!overlay.classList.contains('open')) render();
  }, 60000);

  fetchNotes();
})();
</script>
</body>
</html>
